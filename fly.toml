app = 'gramps-web-h6anow'
primary_region = 'ams'

[build]

[env]
  GRAMPSWEB_HOST = "0.0.0.0"
  GRAMPSWEB_PORT = "5000"
  
[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
